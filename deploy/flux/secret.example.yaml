# tAImline app secrets. COPY to secret.yaml, fill values, then encrypt IN PLACE
# before committing:
#
#     cp secret.example.yaml secret.yaml
#     # edit values
#     sops --encrypt --in-place secret.yaml
#
# The repo .sops.yaml rule encrypts only stringData/data, so kind/metadata stay
# readable in git diff. The apps Flux Kustomization has decryption.provider:sops
# (secretRef sops-age), so this is decrypted in-cluster at apply time.
#
# NEVER commit secret.yaml in plaintext. Only the encrypted form.
---
apiVersion: v1
kind: Secret
metadata:
  name: taimline-secrets
  namespace: taimline
type: Opaque
stringData:
  # Long random string for session token signing.
  SESSION_SECRET: "change-me"
  # OAuth (M1)
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  # S3-compatible object storage (M3)
  S3_ENDPOINT: ""
  S3_REGION: "auto"
  S3_BUCKET: ""
  S3_ACCESS_KEY_ID: ""
  S3_SECRET_ACCESS_KEY: ""
  S3_PUBLIC_BASE_URL: ""
